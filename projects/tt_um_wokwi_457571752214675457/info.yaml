  title:        "first_name"      # Project title
  author:       "Zaid"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Outputs Initial when certain pin is inputted"      # One line description of what your project does
