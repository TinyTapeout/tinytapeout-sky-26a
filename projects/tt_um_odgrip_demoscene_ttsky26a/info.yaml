# Tiny Tapeout project information
project:
  title:        "My first demoscene"
  author:       "Riccardo Pellegrini"
  discord:      ""
  description:  "Tiny Tapeout VGA demoscene logo inspired by the TT mark."
  language:     "Verilog"
  clock_hz:     25000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Your top module name must start with "tt_um_".
  top_module:  "tt_um_odgrip_demoscene_ttsky26a"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "invert colors"
  ui[1]: "freeze logo at center"
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "red[1]"
  uo[1]: "green[1]"
  uo[2]: "blue[1]"
  uo[3]: "vsync"
  uo[4]: "red[0]"
  uo[5]: "green[0]"
  uo[6]: "blue[0]"
  uo[7]: "hsync"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
